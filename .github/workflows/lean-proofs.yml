name: Lean proofs

on:
  push:
    paths:
      - 'frahan_proofs/**'
      - '.github/workflows/lean-proofs.yml'
  pull_request:
    paths:
      - 'frahan_proofs/**'
      - '.github/workflows/lean-proofs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and check no `sorry`
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: 'frahan_proofs'
          build-args: 'FrahanProofs'
          use-mathlib-cache: true
      - name: Fail if any real `sorry` slipped in
        run: |
          # Match `sorry` as a tactic/term (after :=, by, =>, |, ;, ⟨, comma, or
          # line start), NOT the word inside docstrings ("no sorry", "uses sorry").
          if grep -rnE '(:=|\bby\b|=>|\||;|⟨|,|^)[[:space:]]*sorry\b' \
               --include='*.lean' frahan_proofs/FrahanProofs; then
            echo "::error::a declaration uses sorry"
            exit 1
          fi
      - name: List declared axioms (exactly one expected: settle_kkt)
        run: |
          echo "axiom declarations in the library:"
          grep -rnE '^[[:space:]]*axiom ' --include='*.lean' frahan_proofs/FrahanProofs || true
