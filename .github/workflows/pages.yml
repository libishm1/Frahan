# Build + deploy the documentation site to GitHub Pages.
# Assembles _site_src/ from the repo's markdown + images with the directory
# structure PRESERVED (so the relative links used throughout wiki/, docs/ and
# examples/ keep working), then builds with MkDocs Material.
name: docs

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
      - "docs/**"
      - "wiki/**"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # no LFS: binaries stay as tiny pointers and are excluded below anyway

      - name: Assemble site source (markdown + images, structure preserved)
        run: |
          mkdir -p _site_src
          # landing page = the repo README
          cp README.md _site_src/index.md
          # copy documentation trees, keeping paths identical so relative
          # links resolve; docs assets only (md + images), never binaries
          for dir in docs wiki examples; do
            [ -d "$dir" ] || continue
            find "$dir" -type f \( -iname "*.md" -o -iname "*.png" -o -iname "*.jpg" \
              -o -iname "*.jpeg" -o -iname "*.svg" -o -iname "*.gif" \
              -o -iname "*.pdf" -o -iname "*.tex" -o -iname "*.py" \) \
              | while read -r f; do
                  mkdir -p "_site_src/$(dirname "$f")"
                  cp "$f" "_site_src/$f"
                done
          done
          # top-level docs the README links to
          for f in LICENSE NOTICE.md CITATION.cff RELEASE_NOTES_v0.1.0-alpha.md \
                   CONTRIBUTING.md CONTRIBUTORS.md THIRD_PARTY_NOTICES.md; do
            [ -f "$f" ] && cp "$f" "_site_src/$f" || true
          done
          # MathJax bootstrap for pymdownx.arithmatex (Material recipe):
          # re-typesets on every page load, including instant navigation
          mkdir -p _site_src/javascripts
          cat > _site_src/javascripts/mathjax.js <<'JS'
          window.MathJax = {
            tex: {
              inlineMath: [["\\(", "\\)"]],
              displayMath: [["\\[", "\\]"]],
              processEscapes: true,
              processEnvironments: true
            },
            options: {
              ignoreHtmlClass: ".*|",
              processHtmlClass: "arithmatex"
            }
          };
          document$.subscribe(() => {
            MathJax.startup.output.clearCache();
            MathJax.typesetClear();
            MathJax.texReset();
            MathJax.typesetPromise();
          });
          JS
          echo "site source files: $(find _site_src -type f | wc -l)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build with MkDocs Material
        run: |
          pip install --quiet mkdocs-material
          mkdocs build --site-dir _site

      # Client-side nest demo (WebAssembly). Resilient: if the WASM build or
      # workload install fails, the docs still deploy and /nest/ just 404s.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
        continue-on-error: true

      - name: Build the WASM nest demo into _site/nest
        continue-on-error: true
        run: |
          dotnet workload restore web/app/Frahan.Nest.Wasm.csproj
          dotnet publish web/app/Frahan.Nest.Wasm.csproj -c Release
          BUNDLE=$(find web/app/bin/Release -type d -name AppBundle | head -1)
          if [ -n "$BUNDLE" ]; then
            mkdir -p _site/nest
            cp -r "$BUNDLE"/. _site/nest/
            echo "nest demo staged: $(find _site/nest -type f | wc -l) files"
          else
            echo "WASM AppBundle not produced; /nest/ will be absent this deploy"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
