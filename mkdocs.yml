# Frahan StonePack documentation site (GitHub Pages).
# Built by .github/workflows/pages.yml: the workflow assembles _site_src/ from
# the repo's markdown + images (structure preserved so relative links keep
# working), then runs `mkdocs build`. Locally: run the same copy steps from the
# workflow, then `pip install mkdocs-material && mkdocs serve`.
site_name: Frahan StonePack
site_description: >-
  Stone-fabrication readiness for Rhino/Grasshopper - scan and GPR ingestion,
  fracture modelling, 2D/3D nesting, masonry stability, and pre-CAM cut planning.
site_url: https://libishm1.github.io/Frahan/
repo_url: https://github.com/libishm1/Frahan
repo_name: libishm1/Frahan
docs_dir: _site_src

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - fenced_code
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Component Reference: docs/components/COMPONENTS.md
  - Results & Benchmarks: docs/results/RESULTS.md
  - Examples: examples/README.md
  - Wiki:
      - Index: wiki/index.md
      - Edge Matching (theory vs implementation): wiki/research/edge_matching_theory_vs_implementation.md
      - Tolerances & Dimensions: wiki/research/tolerances_dimensions_slm_roses.md
  - Install: docs/INSTALL.md
